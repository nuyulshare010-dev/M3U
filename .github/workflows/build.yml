name: Android CI Final Fix

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Bersihkan Resource dan Cache
        run: |
          # Hapus paksa file dengan karakter ilegal $
          find . -name "*$*" -delete
          
          # Perbaiki referensi teks ilegal di file XML
          find . -type f -name "*.xml" -exec sed -i 's/\$avd/avd/g' {} +
          
          # Hapus cache gradle yang mungkin menyimpan library yang korup
          rm -rf ~/.gradle/caches/
          echo "Pembersihan cache selesai."

      - name: Beri izin eksekusi gradlew
        run: chmod +x gradlew

      - name: Build APK Clean
        run: ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          
