name: Android CI Debug Clear

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Eksekusi Penghapusan Resource Bermasalah
        run: |
          echo "Mulai membersihkan resource yang menyebabkan error..."
          
          # 1. Hapus folder drawable-ldrtl yang menyebabkan error mv (dengan log terlihat)
          rm -rfv ./app/src/main/res/drawable-ldrtl-xhdpi
          rm -rfv ./app/src/main/res/drawable-ldrtl-hdpi
          rm -rfv ./app/src/main/res/drawable-ldrtl-mdpi
          
          # 2. Hapus file hantu $avd di folder anydpi (dengan log terlihat)
          rm -fv ./app/src/main/res/drawable-anydpi-v21/\$*
          
          # 3. Hapus folder build lama jika terbawa dari lokal
          rm -rfv ./app/build
          rm -rfv ./.gradle
          
          echo "Pembersihan total selesai."

      - name: Pasang Gradle 7.3.3 & Build
        run: |
          # Menggunakan Gradle sistem untuk menghindari masalah izin gradlew
          wget -q https://services.gradle.org/distributions/gradle-7.3.3-bin.zip
          unzip -q gradle-7.3.3-bin.zip
          export PATH=$PATH:$(pwd)/gradle-7.3.3/bin
          
          # Jalankan build bersih
          gradle clean assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
k
