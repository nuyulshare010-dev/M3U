name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Perbaiki Nama Resource Ilegal secara Total
        run: |
          echo "Mulai pembersihan karakter ilegal ($)..."
          
          # 1. Ganti nama fisik file yang mengandung '$' menjadi '_' di seluruh folder res
          find . -type f -name "*$*" -path "*/src/main/res/*" | while read file; do
            newfile=$(echo "$file" | sed 's/\$/_/g')
            mv "$file" "$newfile"
            echo "Renamed: $file -> $newfile"
          done

          # 2. Ganti semua referensi teks di dalam file XML (misal dari @drawable/$avd ke @drawable/_avd)
          # Ini penting agar build tidak error 'Resource not found'
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/_avd/g' {} +
          
          echo "Pembersihan selesai."

      - name: Beri izin eksekusi gradlew
        run: chmod +x gradlew

      - name: Build APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
