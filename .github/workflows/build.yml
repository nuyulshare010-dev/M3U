name: Android CI Final Kill

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Basmi File Hantu dan Set Gradle
        run: |
          # 1. Paksa versi Gradle yang stabil untuk project Anda
          gradle wrapper --gradle-version 7.3.3
          chmod +x gradlew
          
          # 2. Hapus fisik semua file yang mengandung $ di folder res
          # Ini adalah langkah 'brutal' agar file tidak kembali saat build
          find . -name "*$*" -path "*/src/main/res/*" -delete
          
          # 3. Ganti rujukan teks $ di dalam file XML agar tidak error
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/avd/g' {} +
          
          echo "Pembersihan total selesai."

      - name: Build APK Tanpa Ampun
        run: |
          # --no-build-cache memastikan tidak ada 'ingatan' file lama
          ./gradlew clean assembleDebug --stacktrace --no-daemon --no-build-cache

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
