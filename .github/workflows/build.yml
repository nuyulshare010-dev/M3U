name: Android CI Fix

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Perbaiki Gradlew dan Resource
        run: |
          # 1. Perbaiki file gradlew yang rusak (Line endings & Permissions)
          sed -i 's/\r$//' gradlew
          chmod +x gradlew
          
          # 2. Hapus sisa-sisa file $ ilegal jika masih ada
          find . -name "*$*" -path "*/src/main/res/*" -exec bash -c 'mv "$1" "${1//$/_}"' -- {} \;
          
          # 3. Sinkronkan referensi teks di XML
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/_avd/g' {} +
          
          echo "Perbaikan Gradlew dan Resource selesai."

      - name: Build APK Clean
        run: ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
