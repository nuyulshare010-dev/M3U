name: Android CI Clear & Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Pembersihan Folder Duplikat (Verbose)
        run: |
          echo "Menghancurkan folder yang menyebabkan duplikasi..."
          
          # Hapus folder drawable-ldrtl secara total (Penyebab utama error mv)
          rm -rfv ./app/src/main/res/drawable-ldrtl-xhdpi
          rm -rfv ./app/src/main/res/drawable-ldrtl-hdpi
          rm -rfv ./app/src/main/res/drawable-ldrtl-mdpi
          
          # Hapus file hantu $ di folder anydpi
          find ./app/src/main/res/ -name "*$*" -delete -print
          
          # Hapus sisa-sisa build dari lokal
          rm -rfv ./app/build
          rm -rfv ./.gradle
          
          echo "Isi folder drawable sekarang:"
          ls -R ./app/src/main/res/drawable* || echo "Folder drawable kosong/tidak ada"

      - name: Build dengan Gradle 7.3.3
        run: |
          # Unduh Gradle manual untuk bypass sistem GitHub
          wget -q https://services.gradle.org/distributions/gradle-7.3.3-bin.zip
          unzip -q gradle-7.3.3-bin.zip
          export PATH=$PATH:$(pwd)/gradle-7.3.3/bin
          
          # Kompilasi Bersih
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
