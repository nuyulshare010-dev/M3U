name: Android CI Fix Total

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Bersihkan File Ilegal dan Fix Macro
        run: |
          echo "Menghapus paksa file duplikat/ilegal..."
          # Cari dan hapus file yang mengandung $ secara permanen sebelum build
          find . -name "*$*" -path "*/src/main/res/*" -delete
          
          # Perbaiki referensi teks di XML agar tidak mencari file $ lagi
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/_avd/g' {} +
          
          echo "Pembersihan selesai."

      - name: Beri izin eksekusi gradlew
        run: chmod +x gradlew

      - name: Build APK Clean
        run: |
          # Menggunakan --no-daemon untuk mencegah file lama muncul kembali di memory
          ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
