name: Android CI Fix Gradlew

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradlew & Bersihkan Resource
        run: |
          # 1. Pasang ulang Gradle Wrapper jika hilang
          gradle wrapper
          chmod +x gradlew
          
          # 2. Hapus paksa file yang mengandung karakter ilegal $
          find . -name "*$*" -delete
          
          # 3. Sinkronkan teks referensi di XML
          find . -type f -name "*.xml" -exec sed -i 's/\$avd/avd/g' {} +
          
          echo "Gradlew telah dibuat dan resource dibersihkan."

      - name: Build APK Clean
        run: |
          # Pastikan compileSdk di build.gradle adalah 34
          ./gradlew clean assembleDebug --stacktrace --no-daemon --no-build-cache

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          
