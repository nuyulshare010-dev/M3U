name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Hapus Karakter Ilegal Secara Paksa
        run: |
          echo "Mengecek file bermasalah..."
          # Mencari file dengan tanda $ dan menggantinya menjadi _ secara paksa
          find . -name "*$*" -path "*/src/main/res/*" -exec bash -c 'mv "$1" "${1//$/_}"' -- {} \;
          
          # Mengganti isi teks di dalam XML yang masih memanggil nama file lama
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/_avd/g' {} +
          echo "Pembersihan selesai."

      - name: Beri izin eksekusi gradlew
        run: chmod +x gradlew

      - name: Build APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
