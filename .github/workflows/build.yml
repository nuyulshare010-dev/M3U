name: Android CI Anti-Hantu

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Basmi File Hantu Secara Paksa
        run: |
          echo "Memulai pembersihan resource ilegal..."
          
          # 1. Hapus SEMUA file yang memiliki karakter $ di folder res
          # Ini adalah perintah paling kuat untuk memastikan mereka tidak ikut build
          find . -name "*$*" -path "*/src/main/res/*" -exec rm -rf {} +
          
          # 2. Hapus file hantu spesifik yang sering muncul di log Anda
          rm -f app/src/main/res/drawable-ldrtl-xhdpi/abc_spinner_mtrl_am_alpha.9.png
          rm -f app/src/main/res/drawable-anydpi-v21/\$avd_show_password__0.xml
          rm -f app/src/main/res/drawable-anydpi-v21/\$avd_show_password__1.xml
          rm -f app/src/main/res/drawable-anydpi-v21/\$avd_hide_password__0.xml
          rm -f app/src/main/res/drawable-anydpi-v21/\$avd_hide_password__1.xml

          # 3. Bersihkan sisa teks referensi ilegal di file XML
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/avd/g' {} +
          
          echo "Pembersihan selesai."

      - name: Build Menggunakan Gradle Sistem
        run: |
          # Gunakan gradle sistem agar tidak terhambat izin gradlew
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
