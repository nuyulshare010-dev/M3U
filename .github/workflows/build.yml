name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Pembersihan File Ilegal
        run: |
          echo "Mulai membersihkan nama file..."
          # Mencari file yang mengandung $ dan menggantinya ke _
          find . -name "*$*" -path "*/src/main/res/*" | while read f; do
            mv "$f" "${f//$/_}"
          done
          
          echo "Mulai memperbaiki isi file XML..."
          # Mengganti teks referensi di dalam XML dari $avd ke _avd
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/_avd/g' {} +
          echo "Pembersihan selesai."

      - name: Beri izin eksekusi gradlew
        run: chmod +x gradlew

      - name: Build APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
