name: Android CI Anti-Loop

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Pembersihan Brutal (Tanpa MV)
        run: |
          echo "Menghapus folder dan file hantu secara total..."
          
          # 1. Hapus SEMUA folder drawable-ldrtl (Penyebab utama error bolak-balik)
          rm -rfv ./app/src/main/res/drawable-ldrtl-*
          
          # 2. Hapus SEMUA file yang mengandung tanda $ (File Hantu)
          find ./app/src/main/res/ -name "*$*" -delete -print
          
          # 3. Hapus folder build dan cache yang mungkin terbawa saat Push
          rm -rfv ./app/build
          rm -rfv ./.gradle
          
          echo "Pembersihan selesai. Tidak ada folder yang dipindahkan, hanya dihapus."

      - name: Build dengan Gradle Sistem
        run: |
          # Gunakan Gradle 7.3.3 yang sudah terbukti cocok dengan project Anda
          wget -q https://services.gradle.org/distributions/gradle-7.3.3-bin.zip
          unzip -q gradle-7.3.3-bin.zip
          export PATH=$PATH:$(pwd)/gradle-7.3.3/bin
          
          # Kompilasi dari nol tanpa cache lama
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
