name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Perbaiki Nama Resource Ilegal
        run: |
          echo "Daftar file sebelum diperbaiki:"
          find app/src/main/res/ -name "*$*" || echo "File tidak ditemukan"
          
          # Proses Rename file yang mengandung $ menjadi _
          find app/src/main/res/ -name "*$*" -exec bash -c 'mv "$1" "${1//$/_}"' -- {} \;
          
          # Proses ganti teks referensi di dalam file XML
          grep -rl "\$avd" app/src/main/res/ | xargs sed -i 's/\$avd/_avd/g' || echo "Tidak ada referensi teks yang perlu diganti"
          
          echo "Daftar file setelah diperbaiki:"
          ls app/src/main/res/drawable/
          
      - name: Beri izin eksekusi gradlew
        run: chmod +x gradlew

      - name: Build APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
