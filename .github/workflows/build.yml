name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Pembersihan Paksa Resource
        run: |
          # Pastikan tidak ada lagi file dengan simbol $
          find app/src/main/res/ -name "*$*" -exec bash -c 'mv "$1" "${1//$/_}"' -- {} \; || echo "Tidak ada file $ ditemukan"
          
          # Ganti teks rujukan di dalam file XML secara otomatis
          find app/src/main/res/ -type f -name "*.xml" -exec sed -i 's/\$avd/avd/g' {} +
          
      - name: Build Bersih (Clean Build)
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          
