name: Manual Build & Release APK

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Generate Timestamp
      id: timestamp
      run: echo "value=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Rename and Prepare APK
      run: |
        mkdir -p release-apk
        cp app/build/outputs/apk/debug/*.apk \
        release-apk/NontonTV-debug-${{ steps.timestamp.outputs.value }}.apk

    # ✅ Create release & upload APK (modern way)
    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ci-${{ steps.timestamp.outputs.value }}
        name: CI Build ${{ steps.timestamp.outputs.value }}
        draft: true
        prerelease: false
        body: |
          手动触发的构建版本
          时间：${{ steps.timestamp.outputs.value }}
          触发者：@${{ github.actor }}
        files: release-apk/NontonTV-debug-${{ steps.timestamp.outputs.value }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload APK to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NontonTV-debug-${{ steps.timestamp.outputs.value }}.apk
        path: release-apk/NontonTV-debug-${{ steps.timestamp.outputs.value }}.apk
