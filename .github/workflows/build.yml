name: Android CI Final Solution

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Pasang Gradle 7.3.3 Manual & Basmi File Hantu
        run: |
          # 1. Unduh Gradle 7.3.3 secara manual (Bypass sistem GitHub)
          wget -q https://services.gradle.org/distributions/gradle-7.3.3-bin.zip
          unzip -q gradle-7.3.3-bin.zip
          export PATH=$PATH:$(pwd)/gradle-7.3.3/bin
          
          # 2. Buat wrapper baru yang sesuai dengan versi ini
          gradle wrapper --gradle-version 7.3.3
          chmod +x gradlew
          
          # 3. Hapus file hantu ($) di folder resource
          find . -name "*$*" -path "*/src/main/res/*" -delete
          
          # 4. Perbaiki teks error $avd di XML
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/avd/g' {} +
          
          echo "Pembersihan selesai menggunakan Gradle 7.3.3 manual."

      - name: Build APK Debug
        run: |
          # Paksa build tanpa cache agar file hantu benar-benar hilang
          ./gradlew clean assembleDebug --stacktrace --no-daemon --no-build-cache

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
