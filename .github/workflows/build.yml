name: Android CI Final Kill

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Basmi Gradlew Rusak & File Hantu
        run: |
          # 1. Hapus gradlew bawaan yang bermasalah izinnya
          rm -f gradlew
          
          # 2. Pasang Gradle 7.3.3 segar dari sistem
          wget -q https://services.gradle.org/distributions/gradle-7.3.3-bin.zip
          unzip -q gradle-7.3.3-bin.zip
          export PATH=$PATH:$(pwd)/gradle-7.3.3/bin
          
          # 3. Hapus paksa semua file yang mengandung $ (File Hantu)
          find . -name "*$*" -path "*/src/main/res/*" -delete
          
          # 4. Sinkronkan teks referensi di XML
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/avd/g' {} +
          
          # 5. Jalankan build langsung menggunakan gradle yang baru diunduh
          gradle clean assembleDebug --stacktrace --no-daemon --no-build-cache
          
          echo "Build selesai tanpa menggunakan gradlew bawaan repo."

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
