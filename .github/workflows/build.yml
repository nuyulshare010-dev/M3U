name: Android CI

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Perbaiki Nama Resource Ilegal
        run: |
          echo "Memulai proses pembersihan file..."
          # 1. Cari file yang mengandung karakter $ dan ganti namanya menjadi underscore (_)
          find . -name "*$*" -path "*/src/main/res/*" | while read file; do
            new_file=$(echo "$file" | sed 's/\$/_/g')
            mv "$file" "$new_file"
            echo "Berhasil mengubah: $file menjadi $new_file"
          done
          
          # 2. Ganti semua teks referensi di dalam file XML agar sinkron dengan nama baru
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/_avd/g' {} +
          echo "Pembersihan selesai."

      - name: Beri izin eksekusi gradlew
        run: chmod +x gradlew

      - name: Build APK Debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
