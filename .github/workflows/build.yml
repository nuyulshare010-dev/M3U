name: Android CI Final Fix

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Reset Gradle dan Bersihkan Resource
        run: |
          # 1. Paksa gunakan Gradle Wrapper versi stabil (7.3.3)
          gradle wrapper --gradle-version 7.3.3
          chmod +x gradlew
          
          # 2. Hapus paksa semua file yang mengandung karakter $ (File Hantu)
          find . -name "*$*" -path "*/src/main/res/*" -delete
          
          # 3. Perbaiki referensi teks di XML secara otomatis
          find . -type f -name "*.xml" -path "*/src/main/res/*" -exec sed -i 's/\$avd/avd/g' {} +
          
          echo "Pembersihan selesai, menggunakan Gradle 7.3.3"

      - name: Build APK Debug
        run: ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
