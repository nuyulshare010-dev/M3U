<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 100" width="500" height="100">
  <!-- Haupteinstellungen Icon -->
  <g id="Haupteinstellungen" transform="translate(0, 0)">
    <circle cx="50" cy="50" r="30" stroke="black" stroke-width="5" fill="lightgray"/>
    <circle cx="50" cy="50" r="10" fill="black"/>
    <line x1="50" y1="5" x2="50" y2="20" stroke="black" stroke-width="5"/>
    <line x1="50" y1="80" x2="50" y2="95" stroke="black" stroke-width="5"/>
    <line x1="5" y1="50" x2="20" y2="50" stroke="black" stroke-width="5"/>
    <line x1="80" y1="50" x2="95" y2="50" stroke="black" stroke-width="5"/>
    <line x1="75" y1="25" x2="85" y2="35" stroke="black" stroke-width="5"/>
    <line x1="15" y1="65" x2="25" y2="75" stroke="black" stroke-width="5"/>
    <line x1="75" y1="75" x2="85" y2="65" stroke="black" stroke-width="5"/>
    <line x1="15" y1="35" x2="25" y2="25" stroke="black" stroke-width="5"/>
  </g>

  <!-- Playlisten Icon -->
  <g id="Playlisten" transform="translate(100, 0)">
    <rect x="20" y="20" width="60" height="20" fill="lightgray" stroke="black" stroke-width="5"/>
    <rect x="20" y="50" width="60" height="20" fill="lightgray" stroke="black" stroke-width="5"/>
    <rect x="20" y="80" width="60" height="20" fill="lightgray" stroke="black" stroke-width="5"/>
  </g>

  <!-- EPG Icon -->
  <g id="EPG" transform="translate(200, 0)">
    <rect x="20" y="20" width="60" height="60" fill="lightgray" stroke="black" stroke-width="5"/>
    <line x1="20" y1="40" x2="80" y2="40" stroke="black" stroke-width="5"/>
    <line x1="20" y1="60" x2="80" y2="60" stroke="black" stroke-width="5"/>
  </g>

  <!-- Fortgeschritten Icon -->
  <g id="Fortgeschritten" transform="translate(300, 0)">
    <polygon points="50,20 80,50 50,80 20,50" fill="lightgray" stroke="black" stroke-width="5"/>
    <circle cx="50" cy="50" r="10" fill="black"/>
  </g>

  <!-- Premium Zugang Icon -->
  <g id="Premium Zugang" transform="translate(400, 0)">
    <circle cx="50" cy="50" r="40" stroke="gold" stroke-width="5" fill="lightgray"/>
    <polygon points="50,15 65,50 50,85 35,50" fill="gold" stroke="black" stroke-width="5"/>
  </g>
</svg>
